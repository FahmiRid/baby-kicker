name: Send Reminders

on:
  schedule:
    # Runs every minute
    - cron: "* * * * *"
  workflow_dispatch: # Allow manual trigger from GitHub Actions tab

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    environment: Production - baby-kicker-blwv
    steps:
      - name: Call reminder cron endpoint
        run: |
          if [ -z "${{ secrets.APP_URL }}" ]; then
            echo "Error: APP_URL secret is missing in environment 'Production - baby-kicker-blwv'"
            exit 1
          fi
          # Using -L to follow redirects and ensuring the URL is constructed correctly
          CLEAN_URL=$(echo "${{ secrets.APP_URL }}" | sed 's/\/*$//')
          curl -s -L -X GET "$CLEAN_URL/api/cron/send-reminders" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET || vars.CRON_SECRET }}" \
            -w "\nHTTP Status: %{http_code}\n"
